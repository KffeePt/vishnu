name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Verify staged release assets
      run: |
        test -f bin/release/vishnu-installer.exe
        test -f bin/release/vishnu-installer.sh
        test -f bin/release/vishnu-installer.exe.sha256
        test -f bin/release/vishnu-installer.sh.sha256
        test -f bin/release/vishnu-installer.exe.asc
        test -f bin/release/vishnu-installer.sh.asc
        chmod +x bin/release/vishnu-installer.sh

    - name: Create Stable Release
      if: ${{ !contains(github.ref_name, '-') }}
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        make_latest: true
        prerelease: false
        files: |
          bin/release/*

    - name: Create Prerelease
      if: ${{ contains(github.ref_name, '-') }}
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        make_latest: false
        prerelease: true
        files: |
          bin/release/*

  deploy-functions:
    needs: [create-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FIREBASE_PROJECT_ID: ${{ secrets.VISHNU_FIREBASE_PROJECT_ID }}
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.VISHNU_FIREBASE_SERVICE_ACCOUNT }}
    steps:
    - uses: actions/checkout@v4

    - name: Check Firebase deploy configuration
      id: firebase
      shell: bash
      run: |
        if [ -z "$FIREBASE_PROJECT_ID" ] || [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
          echo "configured=false" >> "$GITHUB_OUTPUT"
          echo "::warning::Skipping Cloud Functions deploy because VISHNU_FIREBASE_SERVICE_ACCOUNT or VISHNU_FIREBASE_PROJECT_ID is not configured."
        else
          echo "configured=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup Node.js
      if: ${{ steps.firebase.outputs.configured == 'true' }}
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Setup Bun
      if: ${{ steps.firebase.outputs.configured == 'true' }}
      uses: oven-sh/setup-bun@v2

    - name: Authenticate to Google Cloud
      if: ${{ steps.firebase.outputs.configured == 'true' }}
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ env.FIREBASE_SERVICE_ACCOUNT }}

    - name: Install root dependencies
      if: ${{ steps.firebase.outputs.configured == 'true' }}
      run: bun install --frozen-lockfile

    - name: Install Functions dependencies
      if: ${{ steps.firebase.outputs.configured == 'true' }}
      working-directory: functions
      run: bun install --frozen-lockfile

    - name: Deploy Cloud Functions
      if: ${{ steps.firebase.outputs.configured == 'true' }}
      env:
        GOOGLE_CLOUD_PROJECT: ${{ env.FIREBASE_PROJECT_ID }}
        GCLOUD_PROJECT: ${{ env.FIREBASE_PROJECT_ID }}
      run: bunx firebase-tools deploy --only functions --project "$GOOGLE_CLOUD_PROJECT" --non-interactive
