name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Compile C++ Installer
      run: |
        mkdir -p setup/output
        g++ -std=c++17 -o setup/output/vishnu-installer.exe setup/src/main.cpp -static -ladvapi32 -lshlwapi -luser32
        
    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vishnu-installer.exe
        path: setup/output/vishnu-installer.exe

  build-unix:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Package Bash Installer
      run: |
        mkdir -p setup/output
        cp setup/src/installer.sh setup/output/vishnu-installer.sh
        
    - name: Upload Unix Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vishnu-installer.sh
        path: setup/output/vishnu-installer.sh

  create-release:
    needs: [build-windows, build-unix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: vishnu-installer.exe
        path: setup/output/
        
    - name: Download Unix Artifact
      uses: actions/download-artifact@v4
      with:
        name: vishnu-installer.sh
        path: setup/output/
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          setup/output/vishnu-installer.exe
          setup/output/vishnu-installer.sh
